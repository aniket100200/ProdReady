<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        /* CSS Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f8f9fa; /* Soft off-white background */
            color: #343a40;
            text-align: center;
        }

        .error-container {
            max-width: 600px;
            padding: 2rem;
            animation: fadeIn 0.8s ease-in-out;
        }

        /* Gradient styling for the massive 404 */
        .error-code {
            font-size: 9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            line-height: 1;
            letter-spacing: -5px;
        }

        .error-title {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #2d3748;
            font-weight: 700;
        }

        .error-message {
            font-size: 1.1rem;
            color: #718096;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* Styled Call-to-Action Button */
        .home-btn {
            display: inline-block;
            padding: 0.9rem 2.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .home-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(118, 75, 162, 0.4);
            filter: brightness(1.1);
        }

        /* Simple fade-in animation on load */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mobile responsiveness */
        @media (max-width: 480px) {
            .error-code {
                font-size: 6rem;
            }
            .error-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

<div class="error-container">
    <div class="error-code">404</div>
    <h2 class="error-title">Oops! Page Not Found</h2>
    <p class="error-message">
        The page you are looking for might have been removed, had its name changed, or is temporarily unavailable. Let's
        get you back on track.
    </p>
    <a href="/" class="home-btn">Return to Homepage</a>
</div>

</body>
</html>
