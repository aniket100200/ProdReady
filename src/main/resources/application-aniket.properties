#spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/AniketDb}
#Demo Database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
# Expose health and info endpoints (use "*" to expose everything, but be careful in production!)
#management.endpoints.web.exposure.include=health,info,metrics,env,beans
management.endpoints.web.exposure.include=prometheus
management.metrics.export.prometheus.enabled=true
###
# JTE Configurations
jte.templateLocation=src/main/jte
jte.developmentMode=true